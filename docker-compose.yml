services:
  finance-dashboard:
    build: .
    container_name: finance-dashboard
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TWELVE_DATA_API_KEY=your_api_key_here
      - RATELIMIT_STORAGE_URI=memory://  # Change to redis://redis:6379 for multi-server
    restart: unless-stopped
